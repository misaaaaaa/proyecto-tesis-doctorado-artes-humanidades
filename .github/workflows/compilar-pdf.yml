name: compilar y subir PDFs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: compilar PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: proyecto.tex
          compiler: latexmk
          args: -xelatex -interaction=nonstopmode -file-line-error
          extra_system_packages: |
            biber
            fonts-noto
            fonts-noto-core
            fonts-noto-extra

      - name: mostrar logs si falla
        if: failure()
        run: |
          echo "===== proyecto.log ====="
          cat proyecto.log || true

          echo "===== proyecto.blg ====="
          cat proyecto.blg || true

          echo "===== archivos generados ====="
          ls -lah

      - name: preparar sitio
        run: |
          mkdir site
          cp proyecto.pdf site/proyecto.pdf

          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">

            <title>montoyamoraga - proyecto tesis</title>

            <style>
              html, body {
                margin: 0;
                padding: 0;
                background: #111;
                width: 100%;
                height: 100%;
                overflow: hidden;
                font-family: sans-serif;
              }

              iframe {
                width: 100vw;
                height: 100vh;
                border: none;
              }
            </style>
          </head>

          <body>
            <iframe src="proyecto.pdf"></iframe>
          </body>
          </html>
          EOF

      - name: upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4